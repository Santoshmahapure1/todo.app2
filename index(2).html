<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }
    .app {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 24px; }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #4f6ef7; }
    button.add-btn {
      background: #4f6ef7;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    button.add-btn:hover { background: #3a56d4; }
    .todo-list { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .todo-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .todo-item span {
      flex: 1;
      font-size: 15px;
      color: #333;
    }
    .todo-item span.done {
      text-decoration: line-through;
      color: #aaa;
    }
    .del-btn {
      background: none;
      border: none;
      color: #e05;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
    }
    .empty { color: #aaa; font-size: 14px; text-align: center; padding: 20px 0; }
    .footer { font-size: 12px; color: #bbb; text-align: center; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="app">
    <h1>📝 My Todo App</h1>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button class="add-btn" onclick="addTask()">Add</button>
    </div>
    <ul class="todo-list" id="todoList">
      <li class="empty" id="emptyMsg">No tasks yet. Add one above!</li>
    </ul>
    <div class="footer">Built with HTML, CSS & JS · Deployed via Jenkins</div>
  </div>

  <script>
    const input = document.getElementById('taskInput');
    const list = document.getElementById('todoList');
    const emptyMsg = document.getElementById('emptyMsg');
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

    function render() {
      list.innerHTML = '';
      if (tasks.length === 0) {
        list.innerHTML = '<li class="empty" id="emptyMsg">No tasks yet. Add one above!</li>';
        return;
      }
      tasks.forEach((t, i) => {
        const li = document.createElement('li');
        li.className = 'todo-item';
        li.innerHTML = `
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${i})"/>
          <span class="${t.done ? 'done' : ''}">${t.text}</span>
          <button class="del-btn" onclick="remove(${i})">✕</button>
        `;
        list.appendChild(li);
      });
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ text, done: false });
      input.value = '';
      render();
    }

    function toggle(i) { tasks[i].done = !tasks[i].done; render(); }
    function remove(i) { tasks.splice(i, 1); render(); }

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
    render();
  </script>
</body>
</html>
